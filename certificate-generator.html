<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Generator - Kingdom Seekers Fellowship</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 16px;
      opacity: 0.9;
    }
    .content {
      padding: 30px;
    }
    .filters {
      background: #f8fafc;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .filter-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .filter-group {
      flex: 1;
      min-width: 200px;
    }
    .filter-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #4a5568;
      font-size: 14px;
    }
    .filter-group select, .filter-group input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
    }
    .filter-group select:focus, .filter-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-success {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      color: white;
    }
    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .student-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    .student-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
      transform: translateY(-2px);
    }
    .student-card h3 {
      color: #2d3748;
      margin-bottom: 10px;
      font-size: 20px;
    }
    .student-card p {
      color: #64748b;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .student-card .class {
      display: inline-block;
      background: #e0e7ff;
      color: #667eea;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }
    .student-card .graduated {
      display: inline-block;
      background: #d1fae5;
      color: #065f46;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
      margin-left: 8px;
    }
    .stats {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      text-align: center;
    }
    .stats h2 {
      font-size: 36px;
      margin-bottom: 5px;
    }
    .stats p {
      font-size: 16px;
      opacity: 0.95;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-size: 16px;
    }
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .no-results i {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    @media (max-width: 768px) {
      .students-grid {
        grid-template-columns: 1fr;
      }
      .filter-row {
        flex-direction: column;
      }
      .filter-group {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Certificate Generator</h1>
      <p>Kingdom Seekers Fellowship - Discipleship Program</p>
    </div>
    
    <div class="content">
      <div class="stats">
        <h2 id="totalGraduated">0</h2>
        <p>Students Graduated</p>
      </div>

      <div class="filters">
        <div class="filter-row">
          <div class="filter-group">
            <label>Search Student</label>
            <input type="text" id="searchInput" placeholder="Type student name..." oninput="filterStudents()">
          </div>
          <div class="filter-group">
            <label>Filter by Class</label>
            <select id="classFilter" onchange="filterStudents()">
              <option value="">All Classes</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Filter by Month/Year</label>
            <input type="month" id="monthFilter" onchange="filterStudents()">
          </div>
        </div>
      </div>

      <div id="studentsContainer" class="students-grid">
        <div class="loading">Loading graduated students...</div>
      </div>
    </div>
  </div>
    <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCdSvUk6qpC857ZJfaDbniDlOKvWXPYYXY",
      authDomain: "discipleship-dashboard-4d713.firebaseapp.com",
      databaseURL: "https://discipleship-dashboard-4d713-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "discipleship-dashboard-4d713",
      storageBucket: "discipleship-dashboard-4d713.firebasestorage.app",
      messagingSenderId: "27738663604",
      appId: "1:27738663604:web:bf1898247e0dd5a37805e1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allStudents = [];
    let filteredStudents = [];

    // Lessons list
    const lessons = [
      "Salvation",
      "Temptations",
      "Prayers",
      "The Bible",
      "Fellowship",
      "Bearing Fruits/Witnessing",
      "Baptism",
      "Holy Spirit",
      "Kingdom Service",
      "Deliverance"
    ];

    // Load graduated students
    function loadGraduatedStudents() {
      database.ref('students').once('value', snapshot => {
        const students = snapshot.val() || {};
        allStudents = [];
        
        Object.keys(students).forEach(id => {
          const student = students[id];
          if (student.graduationDate && student.status === 'graduated') {
            allStudents.push({
              id,
              ...student
            });
          }
        });

        // Sort by graduation date (newest first)
        allStudents.sort((a, b) => new Date(b.graduationDate) - new Date(a.graduationDate));
        
        filteredStudents = [...allStudents];
        updateClassFilter();
        displayStudents();
        updateStats();
      }).catch(error => {
        console.error('Error loading students:', error);
        document.getElementById('studentsContainer').innerHTML = 
          '<div class="no-results" style="grid-column: 1/-1;"><p style="color: #ef4444;">Error loading data. Please refresh the page.</p></div>';
      });
    }

    function updateStats() {
      document.getElementById('totalGraduated').textContent = allStudents.length;
    }

    function updateClassFilter() {
      const classFilter = document.getElementById('classFilter');
      const classes = [...new Set(allStudents.map(s => s.class))].sort();
      
      classFilter.innerHTML = '<option value="">All Classes</option>';
      classes.forEach(classNum => {
        const option = document.createElement('option');
        option.value = classNum;
        option.textContent = 'Class ' + classNum;
        classFilter.appendChild(option);
      });
    }

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCdSvUk6qpC857ZJfaDbniDlOKvWXPYYXY",
      authDomain: "discipleship-dashboard-4d713.firebaseapp.com",
      databaseURL: "https://discipleship-dashboard-4d713-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "discipleship-dashboard-4d713",
      storageBucket: "discipleship-dashboard-4d713.firebasestorage.app",
      messagingSenderId: "27738663604",
      appId: "1:27738663604:web:bf1898247e0dd5a37805e1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allStudents = [];
    let filteredStudents = [];

    // All 15 lessons from your tracker
    const allLessons = [
      "Introduction", "Salvation", "Temptation", "Prayers", "Bible",
      "Fellowship", "Witnessing", "Baptism", "HolySpirit1", "HolySpirit2",
      "Giving", "Deliverance1", "Deliverance2", "Evangelism", "Kesha"
    ];

    // Check if student completed all lessons
    function hasCompletedAllLessons(progress) {
      if (!progress) return false;
      let completedCount = 0;
      
      allLessons.forEach(lesson => {
        const lessonData = progress[lesson];
        if (lessonData && lessonData.completed === true) {
          completedCount++;
        }
      });
      
      return completedCount === allLessons.length;
    }

    // Load graduated students
    function loadGraduatedStudents() {
      console.log('Loading students from Firebase...');
      
      // First, load all students
      database.ref('students').once('value', snapshot => {
        const studentsData = snapshot.val() || {};
        console.log('Total students in database:', Object.keys(studentsData).length);
        
        allStudents = [];
        let processedCount = 0;
        
        // For each student, check their progress
        Object.keys(studentsData).forEach(id => {
          const student = studentsData[id];
          
          // Now load progress for this student
          database.ref('progress/' + id).once('value', progressSnapshot => {
            const progress = progressSnapshot.val() || {};
            const hasAllLessons = hasCompletedAllLessons(progress);
            
            // Check if graduated by status OR by completing all lessons
            const isGraduatedByStatus = student.status === 'graduated' || student.graduationDate;
            
            if (isGraduatedByStatus || hasAllLessons) {
              // Get graduation date
              let gradDate = student.graduationDate;
              if (!gradDate && hasAllLessons) {
                // If no graduation date but completed lessons, use today
                gradDate = new Date().toISOString().split('T')[0];
              }
              
              allStudents.push({
                id,
                ...student,
                graduationDate: gradDate,
                status: 'graduated',
                completedLessons: hasAllLessons
              });
              
              console.log('✓ Found graduate:', student.name, '- Date:', gradDate, '- Completed:', hasAllLessons);
            }
            
            processedCount++;
            
            // When all students processed, display them
            if (processedCount === Object.keys(studentsData).length) {
              finalizeDisplay();
            }
          });
        });
        
        // If no students at all
        if (Object.keys(studentsData).length === 0) {
          finalizeDisplay();
        }
      }).catch(error => {
        console.error('Error loading students:', error);
        document.getElementById('studentsContainer').innerHTML = 
          '<div class="no-results" style="grid-column: 1/-1;"><p style="color: #ef4444;">Error loading data: ' + error.message + '</p><p style="margin-top:10px;">Check Firebase connection and console for details.</p></div>';
      });
    }

    function finalizeDisplay() {
      console.log('Total graduates found:', allStudents.length);
      
      // Sort by graduation date (newest first)
      allStudents.sort((a, b) => new Date(b.graduationDate) - new Date(a.graduationDate));
      
      filteredStudents = [...allStudents];
      updateClassFilter();
      displayStudents();
      updateStats();
    }

    function updateStats() {
      document.getElementById('totalGraduated').textContent = allStudents.length;
    }

    function updateClassFilter() {
      const classFilter = document.getElementById('classFilter');
      const classes = [...new Set(allStudents.map(s => s.class))].sort();
      
      classFilter.innerHTML = '<option value="">All Classes</option>';
      classes.forEach(classNum => {
        const option = document.createElement('option');
        option.value = classNum;
        option.textContent = 'Class ' + classNum;
        classFilter.appendChild(option);
      });
    }

    function filterStudents() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const classFilter = document.getElementById('classFilter').value;
      const monthFilter = document.getElementById('monthFilter').value;

      filteredStudents = allStudents.filter(student => {
        // Search filter
        const matchesSearch = !search || 
          student.name.toLowerCase().includes(search) ||
          (student.phone && student.phone.includes(search));

        // Class filter
        const matchesClass = !classFilter || student.class === classFilter;

        // Month filter
        let matchesMonth = true;
        if (monthFilter && student.graduationDate) {
          const gradMonth = student.graduationDate.substring(0, 7); // YYYY-MM
          matchesMonth = gradMonth === monthFilter;
        }

        return matchesSearch && matchesClass && matchesMonth;
      });

      console.log('Filtered results:', filteredStudents.length);
      displayStudents();
    }

    function displayStudents() {
      const container = document.getElementById('studentsContainer');

      if (filteredStudents.length === 0) {
        let message = 'No Graduated Students Found';
        let subMessage = 'Students who complete all lessons will appear here.';
        
        if (allStudents.length === 0) {
          message = 'No Students in Database';
          subMessage = 'Add students in the main tracker first.';
        }
        
        container.innerHTML = 
          '<div class="no-results" style="grid-column: 1/-1;">' +
          '<div style="font-size: 64px; margin-bottom: 20px; opacity: 0.3;">🎓</div>' +
          '<h3>' + message + '</h3>' +
          '<p>' + subMessage + '</p>' +
          '<p style="margin-top: 10px; font-size: 14px; color: #94a3b8;">Total in database: ' + allStudents.length + '</p></div>';
        return;
      }

      container.innerHTML = filteredStudents.map(student => {
        const gradDate = student.graduationDate ? new Date(student.graduationDate).toLocaleDateString('en-GB', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        }) : 'N/A';

        return '<div class="student-card">' +
          '<h3>' + student.name + '</h3>' +
          '<p><strong>Class:</strong> <span class="class">' + student.class + '</span> <span class="graduated">✓ Graduated</span></p>' +
          '<p><strong>Phone:</strong> ' + (student.phone || 'N/A') + '</p>' +
          '<p><strong>Graduation Date:</strong> ' + gradDate + '</p>' +
          '<p><strong>Cohort:</strong> ' + (student.cohort || 'N/A') + '</p>' +
          '<button class="btn btn-success" onclick="generateCertificate(\'' + student.id + '\')" style="margin-top: 15px; width: 100%;">' +
          '🎓 Generate Certificate</button></div>';
      }).join('');
      }
    }
        function generateCertificate(studentId) {
      const student = allStudents.find(s => s.id === studentId);
      if (!student) {
        alert('Student not found!');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('l', 'mm', 'a4'); // Landscape

      // Colors
      const blue = '#1e3a8a';
      const lightBlue = '#3b82f6';
      const orange = '#f59e0b';
      const darkText = '#1f2937';

      // Background
      doc.setFillColor(255, 255, 255);
      doc.rect(0, 0, 297, 210, 'F');

      // Decorative corners - Top right
      doc.setFillColor(59, 130, 246);
      doc.triangle(237, 0, 297, 0, 297, 60, 'F');
      doc.setFillColor(245, 158, 11);
      doc.triangle(247, 0, 297, 0, 297, 50, 'F');

      // Decorative corners - Bottom left
      doc.setFillColor(59, 130, 246);
      doc.triangle(0, 210, 60, 210, 0, 150, 'F');
      doc.setFillColor(245, 158, 11);
      doc.triangle(0, 210, 50, 210, 0, 160, 'F');

      // Border
      doc.setDrawColor(245, 158, 11);
      doc.setLineWidth(2);
      doc.rect(15, 15, 267, 180);
      
      doc.setDrawColor(59, 130, 246);
      doc.setLineWidth(1);
      doc.rect(18, 18, 261, 174);

      // Logo placeholder
      doc.setFillColor(239, 68, 68);
      doc.circle(148.5, 35, 15, 'F');
      doc.setFontSize(8);
      doc.setTextColor(255, 255, 255);
      doc.text('KSF', 148.5, 37, { align: 'center' });

      // Organization Name
      doc.setFontSize(28);
      doc.setTextColor(30, 58, 138);
      doc.setFont('helvetica', 'bold');
      doc.text('KINGDOM SEEKERS FELLOWSHIP', 148.5, 60, { align: 'center' });

      // Contact Info
      doc.setFontSize(12);
      doc.setTextColor(30, 58, 138);
      doc.setFont('helvetica', 'normal');
      doc.text('1139-00600', 148.5, 68, { align: 'center' });
      doc.text('NGARA NAIROBI', 148.5, 75, { align: 'center' });

      // Certificate Title
      doc.setFontSize(32);
      doc.setTextColor(59, 130, 246);
      doc.setFont('times', 'bolditalic');
      doc.text('Discipleship Certificate', 148.5, 95, { align: 'center' });

      // Awarded To
      doc.setFontSize(14);
      doc.setTextColor(62, 39, 35);
      doc.setFont('times', 'italic');
      doc.text('Awarded To', 148.5, 108, { align: 'center' });

      // Student Name
      doc.setFontSize(24);
      doc.setTextColor(30, 58, 138);
      doc.setFont('times', 'bold');
      doc.text(student.name.toUpperCase(), 148.5, 120, { align: 'center' });

      // Dotted line
      doc.setDrawColor(30, 58, 138);
      doc.setLineWidth(0.5);
      doc.setLineDashPattern([2, 2]);
      doc.line(40, 123, 257, 123);
      doc.setLineDashPattern([]);

      // Course description
      doc.setFontSize(11);
      doc.setTextColor(31, 41, 55);
      doc.setFont('times', 'normal');
      doc.text('Upon successful completion of the Discipleship Course which entails:-', 148.5, 135, { align: 'center' });

      // Lessons list
      doc.setFontSize(10);
      doc.setTextColor(62, 39, 35);
      const leftColumnX = 70;
      const rightColumnX = 180;
      const startY = 145;
      const lineHeight = 7;

      // Left column (1-5)
      for (let i = 0; i < 5; i++) {
        doc.text((i + 1) + '. ' + lessons[i], leftColumnX, startY + (i * lineHeight));
      }

      // Right column (6-10)
      for (let i = 5; i < 10; i++) {
        doc.text((i + 1) + '. ' + lessons[i], rightColumnX, startY + ((i - 5) * lineHeight));
      }

      // Date
      const gradDate = student.graduationDate ? new Date(student.graduationDate) : new Date();
      const day = gradDate.getDate();
      const month = gradDate.toLocaleString('en-GB', { month: 'long' });
      const year = gradDate.getFullYear();
      const ordinal = getOrdinal(day);

      doc.setFontSize(11);
      doc.setTextColor(31, 41, 55);
      doc.setFont('times', 'italic');
      doc.text('on this ' + ordinal + ' Day of ' + month + ', ' + year + '.', 148.5, 175, { align: 'center' });

      // Signature line
      doc.setDrawColor(30, 58, 138);
      doc.setLineWidth(0.5);
      doc.line(188, 185, 248, 185);
      
      doc.setFontSize(10);
      doc.setTextColor(31, 41, 55);
      doc.setFont('helvetica', 'bold');
      doc.text('ESSOLLOM KARANJA.', 218, 190, { align: 'center' });
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.text('Senior Pastor', 218, 195, { align: 'center' });

      // Bottom motto
      doc.setFontSize(12);
      doc.setTextColor(62, 39, 35);
      doc.setFont('times', 'italic');
      doc.text('Seek Ye First The Kingdom Of God', 148.5, 205, { align: 'center' });

      // Save PDF
      const fileName = 'Certificate_' + student.name.replace(/\s+/g, '_') + '_' + (student.graduationDate || 'Graduated') + '.pdf';
      doc.save(fileName);
      
      alert('Certificate generated for ' + student.name + '!');
    }

    function getOrdinal(n) {
      const s = ["th", "st", "nd", "rd"];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      loadGraduatedStudents();
    });
  </script>
</body>
</html>
