<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Test</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0f9ff; }
    .box { background: white; padding: 20px; border-radius: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🧪 Database Test</h1>
  <div id="output"></div>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    var output = document.getElementById('output');
    output.innerHTML = '<div class="box">Testing...</div>';
    
    var config = {
      apiKey: "AIzaSyCdSvUk6qpC857ZJfaDbniDlOKvWXPYYXY",
      databaseURL: "https://discipleship-dashboard-4d713-default-rtdb.europe-west1.firebasedatabase.app"
    };
    
    firebase.initializeApp(config);
    var db = firebase.database();
    
    db.ref('students').once('value').then(function(snap) {
      var count = snap.numChildren();
      output.innerHTML = '<div class="box"><h3>✅ Success!</h3><p>Students found: ' + count + '</p></div>';
    }).catch(function(err) {
      output.innerHTML = '<div class="box"><h3>❌ Error</h3><p>' + err.message + '</p></div>';
    });
  </script>
</body>
</html>
