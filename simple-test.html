<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Test</title>
</head>
<body style="padding:20px;font-family:Arial;">
  <h1>🧪 Simple Database Test</h1>
  <div id="result"></div>
  
  <script>
    var out = document.getElementById('result');
    out.innerHTML = '<p>Testing...</p>';
    
    // Try to fetch data directly
    fetch('https://discipleship-dashboard-4d713-default-rtdb.europe-west1.firebasedatabase.app/students.json')
      .then(function(response) {
        return response.json();
      })
      .then(function(data) {
        if (!data) {
          out.innerHTML = '<p style="color:red;">❌ No data returned</p>';
          return;
        }
        var count = Object.keys(data).length;
        out.innerHTML = '<p style="color:green;">✅ SUCCESS!</p><p>Students found: ' + count + '</p>';
        
        // List students
        var list = '<ul>';
        Object.keys(data).forEach(function(key) {
          var s = data[key];
          list += '<li>' + s.name + ' (Class ' + s.class + ') - ' + (s.graduationDate ? '✅ Graduated' : '⏳ In Progress') + '</li>';
        });
        list += '</ul>';
        out.innerHTML += list;
      })
      .catch(function(error) {
        out.innerHTML = '<p style="color:red;">❌ Error: ' + error.message + '</p>';
      });
  </script>
</body>
</html>
